version: '3.8'

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-JobAgent}
  APP_ENV: ${APP_ENV:-development}
  APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me}
  DEBUG: ${JOBAGENT_DEBUG:-true}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://jobagent:jobagent_dev@postgres:5432/jobagent}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
  REDIS_URL: ${REDIS_URL:-redis://:redis_dev@redis:6379/0}
  REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-1800}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
  JWT_ACCESS_TOKEN_EXPIRE: ${JWT_ACCESS_TOKEN_EXPIRE:-900}
  JWT_REFRESH_TOKEN_EXPIRE: ${JWT_REFRESH_TOKEN_EXPIRE:-604800}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/google/callback}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  JSEARCH_API_KEY: ${JSEARCH_API_KEY:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-gemini}
  AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gemini-2.0-flash}
  AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-gemini-2.0-flash-lite}
  AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
  AI_CACHE_TTL: ${AI_CACHE_TTL:-300}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET: ${S3_BUCKET:-jobagent-uploads}
  S3_REGION: ${S3_REGION:-us-east-1}
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@jobagent.local}
  SENTRY_DSN: ${SENTRY_DSN:-}
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - '8001:8000'
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/__pycache__
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app worker -l info --concurrency=4
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/__pycache__
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app beat -l info
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: jobagent
      POSTGRES_USER: jobagent
      POSTGRES_PASSWORD: jobagent_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobagent']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    command: redis-server --requirepass redis_dev --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  mailpit:
    image: axllent/mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
