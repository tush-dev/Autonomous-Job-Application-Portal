name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install ruff mypy
      - name: Ruff check
        working-directory: ./backend
        run: ruff check app/
      - name: MyPy check
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports || true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: ESLint
        working-directory: ./frontend
        run: npm run lint
      - name: TypeScript check
        working-directory: ./frontend
        run: npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: jobagent_test
          POSTGRES_USER: jobagent
          POSTGRES_PASSWORD: jobagent_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL: postgresql+asyncpg://jobagent:jobagent_test@localhost:5432/jobagent_test
          REDIS_URL: redis://localhost:6379/0
      - uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run tests
        working-directory: ./frontend
        run: npm run test -- --coverage

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker
        run: docker build -t jobagent-api ./backend
      - name: Build frontend Docker
        run: docker build -t jobagent-frontend ./frontend

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        working-directory: ./backend
        run: bandit -r app/ -f json -o bandit-report.json || true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: NPM audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true
